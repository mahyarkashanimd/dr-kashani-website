[build]
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Force canonical www domain — all non-www traffic redirects to www
[[redirects]]
  from = "https://menshealthlongisland.com/*"
  to = "https://www.menshealthlongisland.com/:splat"
  status = 301
  force = true

# Strip .html extensions (better for SEO)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true